<main class="">
    <h1>Galéria mojích škodoviek.</h1>
    <section>
        <div class="gallery" id="gallery"></div>

        <div class="lightbox" id="lightbox">
            <span class="close" onclick="closeLightbox()">✖</span>
            <span class="arrow left" onclick="prevImage()">❮</span>
            <img id="lightbox-img">
            <span class="arrow right" onclick="nextImage()">❯</span>
        </div>

        <script>
            const gallery = document.getElementById("gallery");
            const lightbox = document.getElementById("lightbox");
            const lightboxImg = document.getElementById("lightbox-img");

            const totalImages = 23;
            let currentIndex = 0;
            const images = [];

            // Generovanie obrázkov
            for (let i = 1; i <= totalImages; i++) {
                let num = String(i).padStart(3, '0');
                let filename = `foto/i${num}.jpg`;
                images.push(filename);

                let img = document.createElement("img");
                img.src = filename;
                img.onclick = () => openLightbox(i - 1);

                gallery.appendChild(img);
            }

            function openLightbox(index) {
                currentIndex = index;
                lightbox.style.display = "flex";
                lightboxImg.src = images[currentIndex];
            }

            function closeLightbox() {
                lightbox.style.display = "none";
            }

            function nextImage() {
                currentIndex = (currentIndex + 1) % images.length;
                lightboxImg.src = images[currentIndex];
            }

            function prevImage() {
                currentIndex = (currentIndex - 1 + images.length) % images.length;
                lightboxImg.src = images[currentIndex];
            }

            // klik mimo obrázka zatvorí
            lightbox.addEventListener("click", (e) => {
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });

            // klávesy
            document.addEventListener("keydown", (e) => {
                if (lightbox.style.display === "flex") {
                    if (e.key === "ArrowRight") nextImage();
                    if (e.key === "ArrowLeft") prevImage();
                    if (e.key === "Escape") closeLightbox();
                }
            });
        </script>

    </section>



</main>

</body>
</html>
